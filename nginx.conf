worker_processes auto;
# daemon off; # Not strictly needed if using official image default CMD, but safe to include if worried about Exited (0)

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    # Sovereign V15: Docker Internal Resolver [V15_MESH_DNS]
    resolver 127.0.0.11 valid=30s;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Sovereign V15: Ultra-High Speed Mesh Optimization [DNA_V15]
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    sendfile_max_chunk 512k;
    keepalive_timeout  300;
    keepalive_requests 10000;
    client_max_body_size 1024M;

    # Gzip Optimization
    gzip on;
    gzip_types text/plain application/xml application/json text/css application/javascript application/x-mpegURL video/MP2T;
    gzip_proxied any;
    gzip_comp_level 5;
    proxy_read_timeout 600s;
    proxy_connect_timeout 600s;
    proxy_send_timeout 600s;
    send_timeout 600s;
    proxy_buffering off;
    proxy_request_buffering off;

    # Sovereign V15 Master Gateway [PULSE-READY]
    server {
        listen 80;
        server_name fectok.com;
        
        root /usr/share/nginx/html/user;
        index index.html;

        # WebSocket Gateway (Highest Priority)
        location /ws/ {
            # Sovereign V15: High-Speed WebSocket Gateway
            set $backend_upstream "http://sovereign_v15_backend:5000";
            proxy_pass $backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
            proxy_buffering off;
        }

        # API & Core Routes (Omni-Bridge)
        location ~ ^/(api/|login|register|forgot_password|reset_password|verify_token|check_referral|verify_registration|auth|interaction|admin_auth) {
            # Sovereign V15: Standard API Bridge
            proxy_pass http://sovereign_v15_backend:5000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 300s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
        }

        # Sound Engine Proxy
        location /sound_engine/ {
            # Sovereign Sound Loop API Integration (Direct Mesh)
            proxy_pass http://sovereign_sound_loop-sound_engine_api-1:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Video Engine Proxy
        location /video_stream/ {
            # Sovereign Video Stream Bridge
            proxy_pass http://sovereign_v15_uplink:8080/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 600s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;
        }

        # Sovereign Unified Stream Gateway (Upload + HLS)
        location /upload {
            # Sovereign V15: Legacy/Direct Client Upload Bridge
            proxy_pass http://sovereign_v15_uplink:8080/upload;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            client_max_body_size 2048M; 
            proxy_read_timeout 900s;
            proxy_connect_timeout 90s;
            proxy_send_timeout 900s;
            
            proxy_request_buffering off;
            proxy_http_version 1.1;
        }

        location /stream/upload {
            # Sovereign V15: Internal Stream Gateway
            proxy_pass http://sovereign_v15_uplink:8080/upload;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            client_max_body_size 2048M; 
            proxy_read_timeout 900s;
            proxy_connect_timeout 90s;
            proxy_send_timeout 900s;
            
            proxy_request_buffering off;
            proxy_http_version 1.1;
        }

        location /stream/ {
            alias /usr/share/nginx/html/media/;
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Range, If-Modified-Since, Cache-Control, Content-Type" always;
            add_header Access-Control-Expose-Headers "Content-Length, Content-Range" always;
            add_header Accept-Ranges bytes always;
            add_header Cache-Control "public, max-age=31536000, immutable"; # 1 Year Immutable Cache for CDN
            
            if ($request_method = 'OPTIONS') {
                return 204;
            }

            location ~* \.(m3u8)$ {
                add_header Cache-Control "public, max-age=1"; # Playlist updates quickly
                add_header Access-Control-Allow-Origin "*" always;
            }

            location ~* \.(ts)$ {
                add_header Cache-Control "public, max-age=31536000, immutable"; # Segments never change
                add_header Access-Control-Allow-Origin "*" always;
            }
        }

        # Static User Panel
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Sovereign Media Storage (Optimized for Cloudflare Edge)
        location /sovereign_media_hub/ {
            alias /root/sovereign/sovereign_media_hub/;
            autoindex on;
            add_header Access-Control-Allow-Origin "*" always;

            # A_121: Ultra-Fast Edge Caching Logic
            location ~* \.(m3u8)$ {
                add_header Cache-Control "public, max-age=60"; 
                add_header Access-Control-Allow-Origin "*" always;
            }

            location ~* \.(ts)$ {
                add_header Cache-Control "public, max-age=604800, immutable";
                add_header Access-Control-Allow-Origin "*" always;
            }

            location ~* \.(mp4|mp3|jpg|jpeg|png|webp)$ {
                add_header Cache-Control "public, max-age=86400";
                add_header Access-Control-Allow-Origin "*" always;
            }
            
            # Enable Byte-Range support for fast seeking
            add_header Accept-Ranges bytes;
        }

        # Admin Panel Route (Legacy Fallback)
        location /admin/ {
            alias /usr/share/nginx/html/admin/;
            try_files $uri $uri/ /admin/index.html;
        }
    }

    # Sovereign V15 Ghost-Admin Gateway [A_114]
    server {
        listen 80;
        server_name vazo.fectok.com;
        
        root /usr/share/nginx/html/admin;
        index index.html;

        location /ws/ {
            proxy_pass http://backend_node:5000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400s;
            proxy_buffering off;
        }

        location ~ ^/(api/|admin_auth|verify_token|payout|revenue|sponsored|interaction|auth) {
            proxy_pass http://backend_node:5000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
