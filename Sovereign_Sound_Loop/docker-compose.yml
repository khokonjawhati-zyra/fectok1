version: '3.8'
services:
  redis:
    image: redis:alpine
    ports:
      - "6381:6379"
  api:
    image: python:3.11-slim-bookworm
    command: sh -c "pip install fastapi uvicorn redis python-multipart && uvicorn main:app --host 0.0.0.0 --port 8000"
    volumes:
      - ./:/app
      - ./sound_vault:/app/sound_vault_data
    working_dir: /app
    ports:
      - '9900:8000'
    environment:
      - SOUND_VAULT_DIR=/app/sound_vault_data
      - REDIS_HOST=redis
    depends_on:
      - redis
  admin:
    image: nginx:alpine
    ports:
      - '8088:80'
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html
