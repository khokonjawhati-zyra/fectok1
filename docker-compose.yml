version: '3.8'

services:
  # 1. Sovereign Backend Engine (FastAPI) [PILLAR: ADMIN_ABSOLUTE_TRUTH]
  backend_node:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sovereign_v15_backend
    environment:
      - MODE=SCALABLE_PRODUCTION
      - PILLAR=ADMIN_ABSOLUTE_TRUTH
      - SYSTEM_MODE=PRODUCTION
    volumes:
      - /var/lib/sovereign/auth:/app/auth_data
    ports:
      - "5000:5000"
    restart: always
    depends_on:
      - mirror_sync

  # 2. Sovereign Uplink Hub (Flask + FFmpeg + HLS) [PILLAR: REAL_TIME_UPLINK]
  uplink_hub:
    build:
      context: ./sovereign_media_hub/uplink
      dockerfile: Dockerfile
    container_name: sovereign_v15_uplink
    environment:
      - PILLAR=REAL_TIME_UPLINK
      - SYSTEM_MODE=PRODUCTION
    volumes:
      - /var/www/html/media/videos:/app/vault/data # Media Garden (Cloudflare R2 Mount)
    ports:
      - "8080:8080"
    restart: always

  # 3. Mirror Sync Node (Redis) [Pillar 2: Zero-Latency Sync]
  mirror_sync:
    image: redis:latest
    container_name: sovereign_v15_redis
    ports:
      - "6379:6379"
    restart: always

  # 4. Stream Gateway (Nginx) [The Public Face]
  stream_gateway:
    image: nginx:alpine
    container_name: sovereign_v15_gateway
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/www/html/media/videos:/usr/share/nginx/html/media:ro # Direct HLS serving from R2 Mount
      - ./webuser_panel:/usr/share/nginx/html/user:ro
      - ./webadmin_panel:/usr/share/nginx/html/admin:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - uplink_hub
      - backend_node
    restart: always

  # 5. AI Processor Engine (V15 Sharding & Vision) [PILLAR: AI_PROCESSOR]
  ai_processor:
    build:
      context: ./sovereign_media_hub/processor
      dockerfile: Dockerfile
    container_name: sovereign_v15_processor
    environment:
      - PILLAR=AI_PROCESSOR
      - SYSTEM_MODE=PRODUCTION
    volumes:
      - /var/www/html/media/videos:/app/vault/data # Media Garden (Cloudflare R2 Mount)
    restart: always
    depends_on:
      - uplink_hub

networks:
  default:
    name: sovereign_v15_mesh

volumes:
  sovereign_auth:
  sovereign_media:
